{% extends "layout.html" %}

{% block title %}
    Edit
{% endblock %}

{% block main %}
    <h1 class="mb-5">Edit Client</h1>
    <form action="/edit/{{ table[0][5] }}" method="post">
        <div class="container d-flex justify-content-center mt-5">
            <div class="w-100" style="max-width: 500px;"> 
                {% for column in table %}
                <div class="input-group mb-3 input-group mb-3g flex-nowrap">
                    <span class="input-group-text">Handle</span>
                    <input name="handle" type="text" class="form-control" autocomplete="off" value="{{ column[0] }}">
                </div>

                <div class="input-group mb-3 input-group mb-3 flex-nowrap">
                    <span class="input-group-text">Platform</span>
                    <input name="platform" type="text" class="form-control" autocomplete="off" value="{{ column[1] }}">
                </div>

                <div class="input-group mb-3">
                    <label class="input-group-text">Status</label>
                    <select class="form-select" name="status" required>
                        <option value="Lead" {% if column[2] == 'Lead' %}selected{% endif %}>Lead</option>
                        <option value="Contacted" {% if column[2] == 'Contacted' %}selected{% endif %}>Contacted</option>
                        <option value="Replied" {% if column[2] == 'Replied' %}selected{% endif %}>Replied</option>
                        <option value="Negotiating" {% if column[2] == 'Negotiating' %}selected{% endif %}>Negotiating</option>
                        <option value="Deal" {% if column[2] == 'Deal' %}selected{% endif %}>Deal</option>
                        <option value="Completed" {% if column[2] == 'Completed' %}selected{% endif %}>Completed</option>
                    </select>
                </div>

                <div class="input-group mb-3 input-group mb-3 flex-nowrap">
                    <span class="input-group-text">Cost</span>
                    <input name="cost" type="text" class="form-control" autocomplete="off" value="{{ column[3] }}">
                </div>

                <div class="input-group mb-5 input-group mb-3 flex-nowrap">
                    <span class="input-group-text">Notes</span>
                    <input name="notes" type="text" class="form-control" autocomplete="off" value="{{ column[4] }}">
                </div>
                {% endfor %}
            </div>
        </div>
        
        <button name="back" value="back" type="submit" class="btn btn-secondary">Back</button>
        <button name="save" value="save" type="submit" class="btn btn-primary">Save</button>
    </form>

{% endblock %}
